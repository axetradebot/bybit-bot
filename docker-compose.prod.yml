# Production-style compose (tune ports/resources for the host).
name: bybit_futures_bot

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: bybit_timescaledb
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: bybit_shadow
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    command: >
      postgres
        -c shared_preload_libraries=timescaledb
        -c max_connections=200
        -c work_mem=256MB
        -c maintenance_work_mem=1GB
        -c checkpoint_completion_target=0.9
        -c wal_buffers=64MB
        -c effective_cache_size=4GB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d bybit_shadow"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G

  tardis-machine:
    image: tardisdev/tardis-machine:latest
    container_name: bybit_tardis_machine
    restart: unless-stopped
    env_file: .env
    environment:
      TM_API_KEY: ${TARDIS_API_KEY}
    ports:
      - "8001:8000"
      - "8002:8001"
    volumes:
      - tardis_cache:/.cache

volumes:
  timescale_data:
    driver: local
  tardis_cache:
    driver: local
